<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCHALE Vault - Secure RSA Protocol</title>

    <!-- DEPENDENCIES -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@400;700&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet">

    <!-- STYLES -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="theme-arona">

    <!-- NAVIGATION BAR -->
    <nav id="schale-nav">
        <div class="nav-indicator" id="nav-indicator"></div>
        <button class="nav-btn active" id="nav-btn-arona" onclick="switchPage('arona')">
            ENKRIPSI DATA
        </button>
        <button class="nav-btn" id="nav-btn-plana" onclick="switchPage('plana')">
            DEKRIPSI DATA
        </button>
    </nav>

    <!-- MASCOT ASSETS -->
    <img src="arona.png" class="mascot mascot-arona active" id="img-arona">
    <img src="plana.png" class="mascot mascot-plana" id="img-plana">

    <div class="container">

        <!-- PAGE 1: ENCRYPTION (ARONA) -->
        <div id="page-arona" class="page active">
            <div class="header-box arona-header">
                <span>SCHALE | RSA ENCRYPT</span>
            </div>

            <!-- Panel 1: Key Generator -->
            <div class="glass-panel arona-glass">
                <div class="row">
                    <div class="col">
                        <label>PRIMA P</label>
                        <input type="number" id="p_val" placeholder="47">
                    </div>
                    <div class="col">
                        <label>PRIMA Q</label>
                        <input type="number" id="q_val" placeholder="71">
                    </div>
                    <div class="col">
                        <label>E (PUBLIC)</label>
                        <input type="number" id="e_val" placeholder="79">
                    </div>
                </div>

                <button class="action-btn arona-btn" onclick="calcKeys()" style="margin: 10px 0;">
                    GENERATE VAULT KEYS
                </button>

                <div class="row" style="margin-top: 10px;">
                    <div class="col">
                        <label>N (MODULUS)</label>
                        <input type="text" id="n_val" readonly value="3337">
                    </div>
                    <div class="col">
                        <label>D (PRIVATE)</label>
                        <input type="text" id="d_val" readonly placeholder="...">
                    </div>
                </div>
            </div>

            <!-- Panel 2: File Selection -->
            <div class="glass-panel arona-glass">
                <label>FILE TARGET</label>
                <div class="drop-zone" onclick="document.getElementById('file-ar').click()"
                    ondragover="event.preventDefault()" ondrop="event.preventDefault(); handleDrop(event, 'ar')">
                    <div id="txt-ar">Klik atau Seret Berkas Di Sini</div>
                    <input type="file" id="file-ar" style="display:none" onchange="handleSelect(this, 'ar')">
                </div>

                <button class="action-btn arona-btn" style="margin-top: 15px;" onclick="processFile(true)">
                    MULAI ENKRIPSI
                </button>

                <!-- Loading Bar -->
                <div class="progress" id="prog-ar">
                    <div class="progress-fill" id="fill-ar"></div>
                </div>
            </div>
        </div>

        <!-- PAGE 2: DECRYPTION (PLANA) -->
        <div id="page-plana" class="page">
            <div class="header-box plana-header">
                <span>EXTRACTION PROTOCOL</span>
            </div>

            <div class="glass-panel plana-glass">
                <!-- ZIP Option -->
                <div class="header-box plana-header" style="font-size: 12px; padding: 5px 12px; margin-bottom: 10px;">
                    <span>AUTO-IMPORT FROM VAULT ZIP (RECOMMENDED)</span>
                </div>

                <div class="drop-zone" onclick="document.getElementById('file-zip').click()"
                    ondragover="event.preventDefault()" ondrop="event.preventDefault(); handleZipDrop(event)">
                    <div id="txt-zip">Drop ZIP Vault di Sini untuk Ekstraksi Cepat</div>
                    <input type="file" id="file-zip" style="display:none" accept=".zip"
                        onchange="handleZipSelect(this)">
                </div>

                <div style="text-align: center; margin: 15px 0; opacity: 0.5; font-size: 12px;">
                    — ATAU MASUKKAN MANUAL —
                </div>

                <!-- Manual Row -->
                <div class="row">
                    <div class="col">
                        <label>Encrypted File (.enc)</label>
                        <div class="drop-zone" onclick="document.getElementById('file-cip').click()"
                            ondragover="event.preventDefault()"
                            ondrop="event.preventDefault(); handleDrop(event, 'cip')">
                            <div id="txt-cip">Drop .enc file</div>
                            <input type="file" id="file-cip" style="display:none" onchange="handleSelect(this, 'cip')">
                        </div>
                    </div>
                    <div class="col">
                        <label>Security Key Card (.kc)</label>
                        <div class="drop-zone" onclick="document.getElementById('file-tk').click()"
                            ondragover="event.preventDefault()"
                            ondrop="event.preventDefault(); handleDrop(event, 'tk')">
                            <div id="txt-tk">Drop Key Card</div>
                            <input type="file" id="file-tk" style="display:none" onchange="handleSelect(this, 'tk')">
                        </div>
                    </div>
                </div>

                <div class="row">
                    <div class="col">
                        <label>Decoded Modulus N</label>
                        <input type="text" id="pn_val" readonly>
                    </div>
                    <div class="col">
                        <label>Decoded Private D</label>
                        <input type="password" id="pd_val" readonly>
                    </div>
                </div>

                <button class="action-btn plana-btn" id="btn-pl-exec" disabled onclick="processFile(false)">
                    AKTIFKAN PROTOKOL EKSTRAKSI
                </button>

                <!-- Loading Bar -->
                <div class="progress" id="prog-pl">
                    <div class="progress-fill" id="fill-pl"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT ENTRY POINT -->
    <script src="script.js"></script>

</body>

</html>
