<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schale RSA | Blue Archive</title>
    <!-- Modern Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Jura:wght@600;700&family=Nunito:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --ba-blue: #12B3E4;
            --ba-dark-blue: #087EA4;
            --ba-light-blue: #79DBF8;
            --ba-bg: #F3F7F8;
            --ba-slate: #395273;
            --ba-white: rgba(255, 255, 255, 0.85);
        }

        * {
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--ba-bg);
            /* Grid statis yang tidak ikut bergeser saat scroll */
            background-image: linear-gradient(rgba(18, 179, 228, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 179, 228, 0.1) 1px, transparent 1px);
            background-size: 60px 60px; /* Diperbesar ukurannya */
            background-attachment: fixed; /* Membuat background diam/statis */
            color: var(--ba-slate);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-y: auto;
        }

        .container {
            width: 100%;
            max-width: 1000px;
            padding: 40px 20px;
            z-index: 2;
        }

        .header-box {
            background: var(--ba-blue);
            color: white;
            padding: 20px 40px;
            font-family: 'Jura', sans-serif;
            font-size: 32px;
            text-transform: uppercase;
            text-shadow: 0px 4px 10px rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            transform: skewX(-10deg);
            margin-bottom: 30px;
            display: inline-block;
            box-shadow: 4px 6px 15px rgba(18, 179, 228, 0.4);
            position: relative;
        }

        .header-box span {
            display: inline-block;
            transform: skewX(10deg);
            letter-spacing: 2px;
        }

        .glass-panel {
            /* Menghilangkan backdrop-filter untuk performa maksimal (Anti-Lag) */
            background: rgba(255, 255, 255, 0.95); 
            border: 2px solid rgba(18, 179, 228, 0.3);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 8px 20px rgba(57, 82, 115, 0.08); /* Shadow diperhalus agar ringan */
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        /* Decorative strip */
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: var(--ba-blue);
        }

        h2 {
            font-family: 'Jura', sans-serif;
            color: var(--ba-dark-blue);
            margin-top: 0;
            border-bottom: 2px solid rgba(18, 179, 228, 0.2);
            padding-bottom: 10px;
        }

        /* Forms */
        .row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .col {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--ba-slate);
        }

        input[type="text"],
        input[type="number"],
        input[type="password"],
        textarea {
            padding: 12px;
            border: 1px solid rgba(18, 179, 228, 0.4);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.9);
            color: var(--ba-slate);
            font-size: 15px;
            transition: all 0.2s;
            resize: vertical;
        }

        input:focus,
        textarea:focus {
            outline: none;
            border-color: var(--ba-blue);
            box-shadow: 0 0 8px rgba(18, 179, 228, 0.5);
        }

        textarea {
            height: 80px;
            font-family: monospace;
        }

        .cara {
            height: 180px;
        }

        button {
            background: linear-gradient(135deg, var(--ba-blue), var(--ba-dark-blue));
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            font-family: 'Jura', sans-serif;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(18, 179, 228, 0.3);
            transition: all 0.3s;
            text-transform: uppercase;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(18, 179, 228, 0.5);
            background: linear-gradient(135deg, var(--ba-light-blue), var(--ba-blue));
        }

        button:active {
            transform: translateY(0);
        }

        /* Specific modifications for buttons in rows */
        .btn-hitung {
            margin-top: 26px;
        }

        input[readonly],
        textarea[readonly] {
            background: rgba(230, 240, 245, 0.6);
            color: #555;
            cursor: not-allowed;
            border-color: rgba(18, 179, 228, 0.2);
        }

        /* Checkbox styling */
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .mascot-left,
        .mascot-right {
            position: fixed;
            bottom: 0;
            z-index: 1;
            pointer-events: none;
            /* Mencegah gambar memblokir klik pada layar */
            opacity: 0.95;
            /* Ukuran diperbesar */
            max-height: 70vh; 
            background: transparent;
            /* Optimasi agar tidak lag */
            will-change: opacity;
            filter: drop-shadow(0 0 15px rgba(18, 179, 228, 0.3));
        }

        .mascot-left {
            left: 2%;
            /* Sedikit berjarak dari pojok mutlak */
        }

        .mascot-right {
            right: 2%;
        }

        /* Responsive Mobile - Blue Archive Adaptive UI */
        @media (max-width: 768px) {
            .container {
                padding: 20px 10px;
            }
            .header-box {
                font-size: 20px;
                padding: 15px 25px;
                transform: skewX(-5deg);
                width: 90%;
            }
            .header-box span { transform: skewX(5deg); }
            
            .row {
                flex-direction: column;
                gap: 15px;
            }
            
            .glass-panel {
                padding: 15px;
            }
            
            h2 { font-size: 18px; }

            .btn-hitung {
                margin-top: 10px;
                width: 100%;
            }

            /* Sembunyikan maskot di HP agar tidak menutupi form, atau perkecil */
            .mascot-left, .mascot-right {
                max-height: 25vh;
                opacity: 0.3; /* Transparansi tinggi agar form tetap terbaca */
                filter: grayscale(50%);
            }
            
            input, textarea {
                font-size: 16px; /* Ukuran font standar HP agar tidak auto-zoom */
            }
        }
    </style>
</head>

    <script>
        // Mengunci ukuran jendela 1280x720 saat startup
        window.resizeTo(1280, 720);

        // RSA MATH CORE (Using BigInt for secure calculations without float losses)
        function gcd(a, b) {
            a = BigInt(a);
            b = BigInt(b);
            while (b !== 0n) {
                let temp = b;
                b = a % b;
                a = temp;
            }
            return a;
        }

        function modInverse(e, m) {
            e = BigInt(e);
            m = BigInt(m);
            let t0 = 0n, t1 = 1n;
            let r0 = m, r1 = e;
            while (r1 !== 0n) {
                let q = r0 / r1;
                let temp = t0 - q * t1;
                t0 = t1;
                t1 = temp;

                let temq = r0 - q * r1;
                r0 = r1;
                r1 = temq;
            }
            if (r0 > 1n) return 0n; // Not invertible
            if (t0 < 0n) t0 += m;
            return t0;
        }

        function modPow(base, exponent, modulus) {
            let b = BigInt(base);
            let e = BigInt(exponent);
            let m = BigInt(modulus);
            if (m === 1n) return 0n;
            let result = 1n;
            b = b % m;
            while (e > 0n) {
                if (e % 2n === 1n) result = (result * b) % m;
                e = e / 2n;
                b = (b * b) % m;
            }
            return result;
        }

        function isPrime(n) {
            if (!n) return false;
            let num = BigInt(n);
            if (num <= 1n) return false;
            if (num <= 3n) return true;
            if (num % 2n === 0n || num % 3n === 0n) return false;
            let i = 5n;
            while (i * i <= num) {
                if (num % i === 0n || num % (i + 2n) === 0n) return false;
                i += 6n;
            }
            return true;
        }

        // DOM Interactions
        function hitungDasar() {
            let pStr = document.getElementById("p_val").value;
            let qStr = document.getElementById("q_val").value;

            if (!pStr || !qStr) {
                alert("Sensei, mohon isi bilangan prima P dan Q terlebih dahulu!");
                return;
            }

            if (!isPrime(pStr) || !isPrime(qStr)) {
                alert("PERINGATAN: Salah satu bilangan bukan prima murni!");
                return;
            }

            if (pStr === qStr) {
                alert("Sensei, P dan Q tidak boleh bersinggungan nilainya (harus berbeda)!");
                return;
            }

            let p = BigInt(pStr);
            let q = BigInt(qStr);
            let n = p * q;
            let m = (p - 1n) * (q - 1n);

            document.getElementById("n_val").value = n.toString();
            document.getElementById("m_val").value = m.toString();
            document.getElementById("e_val").value = "";
            document.getElementById("d_val").value = "";
        }

        function buatKunciRahasia() {
            let eStr = document.getElementById("e_val").value;
            let mStr = document.getElementById("m_val").value;

            if (!eStr || !mStr) {
                alert("Hitung Modulus terlebih dahulu dan pilih kunci Publik (e)!");
                return;
            }

            let e = BigInt(eStr);
            let m = BigInt(mStr);

            if (gcd(e, m) !== 1n) {
                alert(`Kunci e (${e}) tidak relatif prima dengan Totient m (${m})! Cari bilangan lainnya.`);
                return;
            }

            let d = modInverse(e, m);
            document.getElementById("d_val").value = d.toString();
        }

        function toggleD() {
            let dObj = document.getElementById("d_val");
            let chk = document.getElementById("chkShowD");
            if (chk.checked) {
                dObj.type = "text";
            } else {
                dObj.type = "password";
            }
        }

        function prosesEnkripsi() {
            let eStr = document.getElementById("e_val").value;
            let nStr = document.getElementById("n_val").value;
            let msg = document.getElementById("msg_in").value;

            if (!eStr || !nStr) {
                alert("Arona butuh Kunci Publik (e) dan Modulus (n) yang sudah dihitung formasi kuncinya!");
                return;
            }
            if (msg.length === 0) {
                alert("Tidak ada pesan untuk diolah, Sensei.");
                return;
            }

            let ascStr = "";
            let cipherStr = "";
            let steps = `Rumus C = P^e mod n\n(Di mana e=${eStr}, n=${nStr})\n--------------------------\n`;

            for (let i = 0; i < msg.length; i++) {
                let asciiVal = msg.charCodeAt(i); // Convert to ASCII limit range effectively

                // Pad ASCII values to 3 digits like in C++ app
                let padAscii = String(asciiVal).padStart(3, '0');
                if (i !== 0) { ascStr += " "; cipherStr += " "; }
                ascStr += padAscii;

                let cVal = modPow(BigInt(asciiVal), eStr, nStr);
                cipherStr += cVal.toString();

                steps += `1. Karakter: '${msg[i]}'\n`;
                steps += `2. Decimal: ${asciiVal}\n`;
                steps += `3. C = ${asciiVal}^${eStr} mod ${nStr} = ${cVal}\n`;
                steps += `--------------------------\n`;
            }

            document.getElementById("asc_out").value = ascStr;
            document.getElementById("enc_out").value = cipherStr;
            // Pipeline ciphertext into decrypt terminal automatically
            document.getElementById("cip_in").value = cipherStr;
            document.getElementById("step_enc").value = steps;
        }

        function prosesDekripsi() {
            let dStr = document.getElementById("d_val").value;
            let nStr = document.getElementById("n_val").value;
            let cipData = document.getElementById("cip_in").value.trim();

            if (!dStr || !nStr) {
                alert("Sensei, arona belum bisa membuka brankas! (Kunci Privat D dan N kosong)");
                return;
            }
            if (cipData.length === 0) {
                alert("Teks sandi kosong!");
                return;
            }

            let cipherArr = cipData.split(/\s+/);
            let decryptedString = "";
            let steps = `Rumus P = C^d mod n\n(Di mana d=${dStr}, n=${nStr})\n--------------------------\n`;

            for (let i = 0; i < cipherArr.length; i++) {
                if (!cipherArr[i]) continue;
                let c_val = BigInt(cipherArr[i]);
                let p_val = modPow(c_val, dStr, nStr);

                // In C++ it bounds up to char limits
                let recoveredChar = '?';
                if (p_val <= 255n) recoveredChar = String.fromCharCode(Number(p_val));

                decryptedString += recoveredChar;

                steps += `1. Cipherbox: ${c_val}\n`;
                steps += `2. P = ${c_val}^${dStr} mod ${nStr} = ${p_val}\n`;
                steps += `3. ASCII Char = '${recoveredChar}'\n`;
                steps += `--------------------------\n`;
            }

            document.getElementById("dec_out").value = decryptedString;
            document.getElementById("step_dec").value = steps;
        }

    </script>
